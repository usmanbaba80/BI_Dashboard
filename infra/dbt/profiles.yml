# Credentials come from the Docker Compose environment (see .env.example).
mobile_analytics:
  target: prod
  outputs:
    prod:
      type: postgres
      host: "{{ env_var('WAREHOUSE_PG_HOST') }}"
      port: "{{ env_var('WAREHOUSE_PG_PORT', '5432') | int }}"
      user: "{{ env_var('WAREHOUSE_PG_USER') }}"
      password: "{{ env_var('WAREHOUSE_PG_PASSWORD') }}"
      dbname: "{{ env_var('WAREHOUSE_PG_DATABASE') }}"
      schema: "{{ env_var('DBT_SCHEMA', 'silver') }}"
      threads: 4
